<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>进击的煤球</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: #f0f0f0;
            font-family: Arial, sans-serif;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            z-index: 100;
            display: none;
        }
        .game-over h2 {
            font-size: 36px;
            margin-bottom: 20px;
        }
        .game-over p {
            font-size: 20px;
            margin-bottom: 30px;
        }
        .game-over button {
            padding: 15px 30px;
            font-size: 18px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
        .game-over button:hover {
            background: #45a049;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div class="game-over" id="gameOver">
        <h2>游戏结束</h2>
        <p>得分: <span id="finalScore">0</span></p>
        <button onclick="restartGame()">重新开始</button>
    </div>
    <script>
        // 游戏状态
        const gameState = {
            score: 0,
            health: 100,
            gameOver: false,
            coalBalls: [],
            level: 1,
            spawnRate: 1000, // 煤球生成间隔（毫秒）
            lastSpawnTime: 0
        };

        // 游戏配置
        const config = {
            campRadius: 150, // 营地半径（像素）
            coalBallSize: 30, // 煤球大小（半径）
            coalBallSpeed: 2, // 煤球移动速度
            coalBallMaxTime: 3000, // 煤球最大停留时间（毫秒）
            healthDecrease: 10, // 每次减少的生命值
            healthDecreaseInterval: 1000, // 生命值减少间隔（毫秒）
            scoreDecrease: 10 // 进入营地扣分数
        };

        // 获取Canvas元素
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // 营地位置（中心坐标）
        let campPosition = {
            x: 0,
            y: 0
        };

        // 设置Canvas尺寸
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            // 营地位置：屏幕中间
            campPosition.x = canvas.width / 2;
            campPosition.y = canvas.height / 2;
        }

        // 生成煤球
        function spawnCoalBall() {
            // 随机边缘位置
            const edge = Math.floor(Math.random() * 4); // 0: 上, 1: 右, 2: 下, 3: 左
            let x, y;
            
            switch(edge) {
                case 0: // 上
                    x = Math.random() * canvas.width;
                    y = -config.coalBallSize * 2;
                    break;
                case 1: // 右
                    x = canvas.width + config.coalBallSize * 2;
                    y = Math.random() * canvas.height;
                    break;
                case 2: // 下
                    x = Math.random() * canvas.width;
                    y = canvas.height + config.coalBallSize * 2;
                    break;
                case 3: // 左
                    x = -config.coalBallSize * 2;
                    y = Math.random() * canvas.height;
                    break;
            }

            // 目标位置：营地中心附近
            const targetX = campPosition.x + (Math.random() - 0.5) * config.campRadius * 0.5;
            const targetY = campPosition.y + (Math.random() - 0.5) * config.campRadius * 0.5;

            // 创建煤球
            const coalBall = {
                x: x,
                y: y,
                targetX: targetX,
                targetY: targetY,
                speed: config.coalBallSpeed + Math.random() * 1, // 随机速度
                angle: Math.atan2(targetY - y, targetX - x),
                timeInCamp: 0,
                lastHealthDecrease: 0,
                inCamp: false // 标记是否在营地内
            };

            gameState.coalBalls.push(coalBall);
        }

        // 绘制煤球
        function drawCoalBall(coalBall) {
            ctx.save();
            
            // 绘制煤球主体
            ctx.beginPath();
            ctx.arc(coalBall.x, coalBall.y, config.coalBallSize, 0, Math.PI * 2);
            ctx.fillStyle = '#333';
            ctx.fill();
            
            // 绘制绒毛
            for (let i = 0; i < 12; i++) {
                const angle = (Math.PI * 2 / 12) * i;
                const x = coalBall.x + Math.cos(angle) * (config.coalBallSize + 5);
                const y = coalBall.y + Math.sin(angle) * (config.coalBallSize + 5);
                
                ctx.beginPath();
                ctx.arc(x, y, 3, 0, Math.PI * 2);
                ctx.fillStyle = '#555';
                ctx.fill();
            }
            
            // 绘制眼睛
            ctx.beginPath();
            ctx.arc(coalBall.x - 8, coalBall.y - 5, 4, 0, Math.PI * 2);
            ctx.fillStyle = 'white';
            ctx.fill();
            
            ctx.beginPath();
            ctx.arc(coalBall.x + 8, coalBall.y - 5, 4, 0, Math.PI * 2);
            ctx.fillStyle = 'white';
            ctx.fill();
            
            // 绘制眼球
            ctx.beginPath();
            ctx.arc(coalBall.x - 8, coalBall.y - 5, 2, 0, Math.PI * 2);
            ctx.fillStyle = 'black';
            ctx.fill();
            
            ctx.beginPath();
            ctx.arc(coalBall.x + 8, coalBall.y - 5, 2, 0, Math.PI * 2);
            ctx.fillStyle = 'black';
            ctx.fill();
            
            // 绘制嘴巴
            ctx.beginPath();
            ctx.arc(coalBall.x, coalBall.y + 5, 5, 0, Math.PI);
            ctx.strokeStyle = 'black';
            ctx.lineWidth = 2;
            ctx.stroke();
            
            ctx.restore();
        }

        // 绘制营地
        function drawCamp() {
            ctx.save();
            
            // 绘制营地范围（半透明圆形）
            ctx.beginPath();
            ctx.arc(campPosition.x, campPosition.y, config.campRadius, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(139, 69, 19, 0.2)';
            ctx.fill();
            ctx.strokeStyle = '#8B4513';
            ctx.lineWidth = 3;
            ctx.stroke();
            
            // 绘制营地中心标志
            ctx.beginPath();
            ctx.arc(campPosition.x, campPosition.y, 20, 0, Math.PI * 2);
            ctx.fillStyle = '#8B4513';
            ctx.fill();
            ctx.strokeStyle = '#FFD700';
            ctx.lineWidth = 2;
            ctx.stroke();
            
            // 绘制营地名
            ctx.fillStyle = 'white';
            ctx.font = '16px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('玩家营地', campPosition.x, campPosition.y - config.campRadius - 10);
            
            ctx.restore();
        }

        // 绘制生命值和得分
        function drawHUD() {
            ctx.save();
            
            // 绘制生命值条
            ctx.fillStyle = '#4CAF50';
            ctx.fillRect(20, 20, 200, 20);
            
            // 绘制生命值
            const healthWidth = (gameState.health / 100) * 200;
            ctx.fillStyle = '#f44336';
            ctx.fillRect(20, 20, healthWidth, 20);
            
            // 绘制生命值文字
            ctx.fillStyle = 'black';
            ctx.font = '16px Arial';
            ctx.textAlign = 'left';
            ctx.fillText('生命值: ' + gameState.health, 230, 35);
            
            // 绘制得分
            ctx.fillText('得分: ' + gameState.score, 20, 70);
            
            // 绘制等级
            ctx.fillText('等级: ' + gameState.level, 20, 100);
            
            ctx.restore();
        }

        // 绘制背景
        function drawBackground() {
            // 渐变背景
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#87CEEB');
            gradient.addColorStop(1, '#98FB98');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 绘制简单的草地
            ctx.fillStyle = '#228B22';
            ctx.fillRect(0, canvas.height * 0.8, canvas.width, canvas.height * 0.2);
        }

        // 检查碰撞（圆形碰撞检测）
        function checkCollision(coalBall) {
            // 计算煤球与营地中心的距离
            const distance = Math.sqrt(
                Math.pow(coalBall.x - campPosition.x, 2) + 
                Math.pow(coalBall.y - campPosition.y, 2)
            );
            
            // 检查是否在营地范围内
            return distance <= config.campRadius;
        }

        // 更新游戏状态
        function update() {
            if (gameState.gameOver) return;
            
            // 生成煤球
            const currentTime = Date.now();
            if (currentTime - gameState.lastSpawnTime > gameState.spawnRate) {
                spawnCoalBall();
                gameState.lastSpawnTime = currentTime;
                
                // 随着等级提高，减少生成间隔
                if (gameState.level > 1) {
                    gameState.spawnRate = Math.max(500, 1000 - (gameState.level - 1) * 100);
                }
            }
            
            // 更新煤球
            for (let i = gameState.coalBalls.length - 1; i >= 0; i--) {
                const coalBall = gameState.coalBalls[i];
                
                // 检查是否在营地内
                const inCamp = checkCollision(coalBall);
                
                // 如果煤球在营地内且速度为0（被困住），则不移动
                if (!inCamp || coalBall.speed > 0) {
                    // 移动煤球
                    coalBall.x += Math.cos(coalBall.angle) * coalBall.speed;
                    coalBall.y += Math.sin(coalBall.angle) * coalBall.speed;
                }
                
                if (inCamp) {
                    // 煤球进入营地
                    if (!coalBall.inCamp) {
                        // 第一次进入营地，立即扣分
                        gameState.score = Math.max(0, gameState.score - config.scoreDecrease);
                        coalBall.inCamp = true;
                        coalBall.timeInCamp = 0;
                        coalBall.lastHealthDecrease = currentTime;
                        // 困住煤球（速度设为0）
                        coalBall.speed = 0;
                    }
                    
                    // 增加停留时间
                    coalBall.timeInCamp += 16; // 假设60fps，每帧16ms
                    
                    // 煤球在营地停留3秒后，开始每1秒减少生命值
                    if (coalBall.timeInCamp >= 3000 && 
                        currentTime - coalBall.lastHealthDecrease > config.healthDecreaseInterval) {
                        gameState.health -= config.healthDecrease;
                        coalBall.lastHealthDecrease = currentTime;
                    }
                } else {
                    coalBall.timeInCamp = 0;
                    coalBall.inCamp = false;
                }
                
                // 检查是否飞出屏幕
                if (
                    coalBall.x < -config.coalBallSize * 2 ||
                    coalBall.x > canvas.width + config.coalBallSize * 2 ||
                    coalBall.y < -config.coalBallSize * 2 ||
                    coalBall.y > canvas.height + config.coalBallSize * 2
                ) {
                    gameState.coalBalls.splice(i, 1);
                }
            }
            
            // 检查游戏结束
            if (gameState.health <= 0) {
                gameState.gameOver = true;
                document.getElementById('finalScore').textContent = gameState.score;
                document.getElementById('gameOver').style.display = 'block';
            }
        }

        // 弹开煤球
        function bounceCoalBall(x, y) {
            for (let i = gameState.coalBalls.length - 1; i >= 0; i--) {
                const coalBall = gameState.coalBalls[i];
                
                // 计算点击位置与煤球的距离
                const distance = Math.sqrt(
                    Math.pow(x - coalBall.x, 2) + Math.pow(y - coalBall.y, 2)
                );
                
                if (distance <= config.coalBallSize + 10) {
                    // 计算反弹方向（远离点击位置）
                    const angle = Math.atan2(coalBall.y - y, coalBall.x - x);
                    
                    // 设置新的目标位置（屏幕外）
                    const bounceDistance = 200;
                    coalBall.targetX = coalBall.x + Math.cos(angle) * bounceDistance;
                    coalBall.targetY = coalBall.y + Math.sin(angle) * bounceDistance;
                    coalBall.angle = angle;
                    coalBall.speed = 5; // 弹开速度
                    
                    // 增加得分
                    gameState.score += 10;
                    
                    // 检查是否升级
                    if (gameState.score % 100 === 0) {
                        gameState.level++;
                    }
                    
                    break;
                }
            }
        }

        // 游戏主循环
        function gameLoop() {
            // 绘制背景
            drawBackground();
            
            // 绘制营地
            drawCamp();
            
            // 绘制煤球
            gameState.coalBalls.forEach(drawCoalBall);
            
            // 绘制HUD
            drawHUD();
            
            // 更新游戏状态
            update();
            
            requestAnimationFrame(gameLoop);
        }

        // 重新开始游戏
        function restartGame() {
            gameState.score = 0;
            gameState.health = 100;
            gameState.gameOver = false;
            gameState.coalBalls = [];
            gameState.level = 1;
            gameState.spawnRate = 1000;
            gameState.lastSpawnTime = 0;
            
            document.getElementById('gameOver').style.display = 'none';
        }

        // 触摸滑动状态
        let touchStartX = 0;
        let touchStartY = 0;
        let touchEndX = 0;
        let touchEndY = 0;
        let touchStartTime = 0;

        // 初始化
        function init() {
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);
            
            // 触摸事件
            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                const touch = e.touches[0];
                touchStartX = touch.clientX;
                touchStartY = touch.clientY;
                touchStartTime = Date.now();
            });
            
            canvas.addEventListener('touchend', (e) => {
                e.preventDefault();
                if (e.changedTouches.length > 0) {
                    const touch = e.changedTouches[0];
                    touchEndX = touch.clientX;
                    touchEndY = touch.clientY;
                    const touchDuration = Date.now() - touchStartTime;
                    
                    // 计算滑动距离和速度
                    const deltaX = touchEndX - touchStartX;
                    const deltaY = touchEndY - touchStartY;
                    const distance = Math.sqrt(deltaX * deltaX + deltaY * deltaY);
                    const speed = distance / touchDuration;
                    
                    // 如果是快速滑动，弹飞煤球
                    if (distance > 30 && speed > 0.5) {
                        // 找到滑动路径上的煤球
                        gameState.coalBalls.forEach(coalBall => {
                            // 检查煤球是否在滑动路径附近
                            const rect = canvas.getBoundingClientRect();
                            const coalX = coalBall.x + rect.left;
                            const coalY = coalBall.y + rect.top;
                            
                            // 计算点到线段的距离
                            const distanceToLine = distanceToSegment(
                                coalX, coalY, 
                                touchStartX, touchStartY, 
                                touchEndX, touchEndY
                            );
                            
                            if (distanceToLine < config.coalBallSize + 20) {
                                // 计算反弹方向（按照手指滑动的方向）
                                // 这里使用从煤球到滑动终点的方向，这样更符合弹飞的感觉
                                const rect = canvas.getBoundingClientRect();
                                const coalScreenX = coalBall.x + rect.left;
                                const coalScreenY = coalBall.y + rect.top;
                                const angle = Math.atan2(touchEndY - coalScreenY, touchEndX - coalScreenX);
                                
                                // 设置新的目标位置（屏幕外）
                                const bounceDistance = 200;
                                coalBall.targetX = coalBall.x + Math.cos(angle) * bounceDistance;
                                coalBall.targetY = coalBall.y + Math.sin(angle) * bounceDistance;
                                coalBall.angle = angle;
                                coalBall.speed = 8; // 弹开速度
                                
                                // 增加得分
                                gameState.score += 10;
                                
                                // 检查是否升级
                                if (gameState.score % 100 === 0) {
                                    gameState.level++;
                                }
                            }
                        });
                    } else {
                        // 普通点击
                        const rect = canvas.getBoundingClientRect();
                        const x = touchEndX - rect.left;
                        const y = touchEndY - rect.top;
                        bounceCoalBall(x, y);
                    }
                }
            });
            
            // 鼠标事件（用于调试）
            canvas.addEventListener('click', (e) => {
                const rect = canvas.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                bounceCoalBall(x, y);
            });
            
            gameLoop();
        }
        
        // 计算点到线段的距离
        function distanceToSegment(px, py, x1, y1, x2, y2) {
            const A = px - x1;
            const B = py - y1;
            const C = x2 - x1;
            const D = y2 - y1;
            
            const dot = A * C + B * D;
            const lenSq = C * C + D * D;
            let param = -1;
            
            if (lenSq !== 0) {
                param = dot / lenSq;
            }
            
            let xx, yy;
            
            if (param < 0) {
                xx = x1;
                yy = y1;
            } else if (param > 1) {
                xx = x2;
                yy = y2;
            } else {
                xx = x1 + param * C;
                yy = y1 + param * D;
            }
            
            const dx = px - xx;
            const dy = py - yy;
            return Math.sqrt(dx * dx + dy * dy);
        }

        // 启动游戏
        init();
    </script>
</body>
</html>
