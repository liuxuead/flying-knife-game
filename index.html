<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>进击的煤球</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: #f0f0f0;
            font-family: Arial, sans-serif;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            z-index: 100;
            display: none;
        }
        .game-over h2 {
            font-size: 36px;
            margin-bottom: 20px;
        }
        .game-over p {
            font-size: 20px;
            margin-bottom: 30px;
        }
        .game-over button {
            padding: 15px 30px;
            font-size: 18px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
        .game-over button:hover {
            background: #45a049;
        }
        .level-up {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 215, 0, 0.9);
            color: #333;
            padding: 30px 50px;
            border-radius: 20px;
            text-align: center;
            z-index: 100;
            display: none;
            animation: fadeInOut 2s ease-in-out;
            pointer-events: none; /* 允许点击穿透 */
        }
        .level-up h2 {
            font-size: 32px;
            margin-bottom: 10px;
        }
        .level-up p {
            font-size: 18px;
        }
        @keyframes fadeInOut {
            0%, 100% { opacity: 0; }
            20%, 80% { opacity: 1; }
        }
        .music-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.8);
            border: 2px solid #333;
            font-size: 24px;
            cursor: pointer;
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .music-btn:hover {
            background: rgba(255, 255, 255, 1);
        }
        .music-btn.muted {
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <button class="music-btn" id="soundBtn" onclick="toggleSound()" style="z-index: 100;">🔊</button>
    <button class="music-btn" id="pauseBtn" onclick="togglePause()" style="top: 80px; z-index: 100;">⏸️</button>
    <div class="game-over" id="gameOver">
        <h2>游戏结束</h2>
        <p>得分: <span id="finalScore">0</span></p>
        <button onclick="restartGame()">重新开始</button>
    </div>
    <div class="level-up" id="levelUp">
        <h2>关卡提升！</h2>
        <p>第 <span id="currentLevelDisplay">1</span> 关</p>
    </div>
    <script>
        // 游戏状态
        const gameState = {
            score: 0,
            health: 100,
            gameOver: false,
            paused: false, // 游戏暂停状态
            coalBalls: [],
            currentLevel: 1, // 当前关卡
            spawnRate: 3000, // 煤球生成间隔（毫秒）- 3秒
            lastSpawnTime: 0,
            lastExtraSpawnTime: 0 // 上次额外生成煤球的时间
        };

        // 音效系统
        let soundEffects = {
            bounce: null
        };
        let isSoundEnabled = true;

        // 加载音效
        function loadSoundEffects() {
            soundEffects.bounce = new Audio('bounce.mp3');
            soundEffects.bounce.volume = 0.5;
        }

        // 播放音效
        function playSound(soundName) {
            if (isSoundEnabled && soundEffects[soundName]) {
                // 重置音频位置，确保可以连续播放
                soundEffects[soundName].currentTime = 0;
                soundEffects[soundName].play().catch(e => {
                    console.log('音效播放失败:', e);
                });
            }
        }

        // 切换音效
        function toggleSound() {
            const soundBtn = document.getElementById('soundBtn');
            
            isSoundEnabled = !isSoundEnabled;
            
            if (isSoundEnabled) {
                soundBtn.textContent = '🔊';
                soundBtn.classList.remove('muted');
            } else {
                soundBtn.textContent = '🔇';
                soundBtn.classList.add('muted');
            }
        }

        // 切换暂停
        function togglePause() {
            const pauseBtn = document.getElementById('pauseBtn');
            
            gameState.paused = !gameState.paused;
            
            if (gameState.paused) {
                pauseBtn.textContent = '▶️';
                pauseBtn.classList.add('muted');
            } else {
                pauseBtn.textContent = '⏸️';
                pauseBtn.classList.remove('muted');
            }
        }

        // 关卡配置
        const levelConfig = {
            levelScores: [0, 300, 1000, 2000, 3000, 5000], // 每关的分数目标
            speedMultipliers: [1, 1.8, 2.5, 3.5, 5, 7], // 每关的速度倍数（加大差距）
            maxCoalBalls: [3, 5, 7, 9, 12, 15], // 每关屏幕内最大煤球数量
            backgroundImages: ['', '', '', ''], // 预留背景图片路径
            campColors: [
                'rgba(139, 69, 19, 0.2)', // 第1关：棕色
                'rgba(0, 100, 0, 0.2)',   // 第2关：深绿色
                'rgba(0, 0, 139, 0.2)',   // 第3关：深蓝色
                'rgba(139, 0, 139, 0.2)', // 第4关：深紫色
                'rgba(139, 0, 0, 0.2)',   // 第5关：深红色
                'rgba(218, 165, 32, 0.2)'  // 第6关：金色
            ],
            campBorderColors: [
                '#8B4513', // 第1关：棕色
                '#006400', // 第2关：深绿色
                '#00008B', // 第3关：深蓝色
                '#8B008B', // 第4关：深紫色
                '#8B0000', // 第5关：深红色
                '#DA8520'  // 第6关：金色
            ],
            backgroundGradients: [
                ['#87CEEB', '#98FB98'], // 第1关：天蓝到浅绿
                ['#4682B4', '#32CD32'], // 第2关：钢蓝到酸橙绿
                ['#191970', '#008080'], // 第3关：午夜蓝到青色
                ['#4B0082', '#8B008B'], // 第4关：靛青到深紫
                ['#8B0000', '#FF4500'], // 第5关：深红到橙红
                ['#FFD700', '#FF8C00']  // 第6关：金色到橙红
            ],
            coalBallMaxTimes: [2000, 1500, 1000, 800, 500, 300], // 每关煤球最大停留时间（毫秒），逐关缩短，第1关就开始扣血
            extraSpawnIntervals: [null, 6000, 4000, 3000, 2000, 1500] // 每关额外生成煤球的间隔（毫秒），第1关无额外生成
        };

        // 游戏配置
        const config = {
            campWidth: 200, // 营地宽度（像素）
            campHeight: 200, // 营地高度（像素）
            coalBallSize: 20, // 煤球大小（半径）
            coalBallSpeed: 2, // 煤球移动速度
            coalBallMaxTime: 3000, // 煤球最大停留时间（毫秒）
            healthDecrease: 10, // 每次减少的生命值
            healthDecreaseInterval: 1000, // 生命值减少间隔（毫秒）
            scoreDecrease: 10 // 进入营地扣分数
        };

        // 获取Canvas元素
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // 加载煤球图片
        const coalBallImage = new Image();
        coalBallImage.src = 'xiaomeiqiu.png';

        // 加载营地图片
        const campImage = new Image();
        campImage.src = 'chengbao.jpg';

        // 加载背景图片
        const backgroundImages = [];
        for (let i = 0; i < 6; i++) {
            const img = new Image();
            img.src = `background${i + 1}.jpg`;
            backgroundImages.push(img);
        }

        // 营地位置（中心坐标）
        let campPosition = {
            x: 0,
            y: 0
        };

        // 设置Canvas尺寸
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            // 营地位置：屏幕中间
            campPosition.x = canvas.width / 2;
            campPosition.y = canvas.height / 2;
        }

        // 生成煤球
        function spawnCoalBall() {
            // 调整随机概率：上下60%，左右40%
            const edgeProbability = Math.random();
            let edge;
            
            if (edgeProbability < 0.3) {
                edge = 0; // 上：30%
            } else if (edgeProbability < 0.6) {
                edge = 2; // 下：30%
            } else if (edgeProbability < 0.8) {
                edge = 1; // 右：20%
            } else {
                edge = 3; // 左：20%
            }
            
            let x, y;
            
            switch(edge) {
                case 0: // 上
                    x = Math.random() * canvas.width;
                    y = -config.coalBallSize * 2;
                    break;
                case 1: // 右
                    x = canvas.width + config.coalBallSize * 2;
                    y = Math.random() * canvas.height;
                    break;
                case 2: // 下
                    x = Math.random() * canvas.width;
                    y = canvas.height + config.coalBallSize * 2;
                    break;
                case 3: // 左
                    x = -config.coalBallSize * 2;
                    y = Math.random() * canvas.height;
                    break;
            }

            // 目标位置：营地中心附近
            const targetX = campPosition.x + (Math.random() - 0.5) * config.campWidth * 0.5;
            const targetY = campPosition.y + (Math.random() - 0.5) * config.campHeight * 0.5;

            // 根据关卡调整速度
            const speedMultiplier = levelConfig.speedMultipliers[gameState.currentLevel - 1];
            const baseSpeed = config.coalBallSpeed + Math.random() * 1;

            // 创建煤球
            const coalBall = {
                x: x,
                y: y,
                lastX: x, // 上一帧位置
                lastY: y,
                targetX: targetX,
                targetY: targetY,
                speed: baseSpeed * speedMultiplier, // 应用关卡速度倍数
                angle: Math.atan2(targetY - y, targetX - x),
                timeInCamp: 0,
                lastHealthDecrease: 0,
                inCamp: false, // 标记是否在营地内
                restricted: false, // 是否被限制在营地内
                isBouncing: false // 是否正在弹飞
            };

            gameState.coalBalls.push(coalBall);
        }

        // 绘制煤球
        function drawCoalBall(coalBall) {
            ctx.save();
            
            // 使用图片绘制煤球
            // 图片大小64x64，煤球半径20，所以图片大小应该是40x40
            const imageSize = config.coalBallSize * 2; // 40像素
            ctx.drawImage(
                coalBallImage, 
                coalBall.x - imageSize / 2, 
                coalBall.y - imageSize / 2, 
                imageSize, 
                imageSize
            );
            
            ctx.restore();
        }

        // 绘制营地
        function drawCamp() {
            ctx.save();
            
            const halfWidth = config.campWidth / 2;
            const halfHeight = config.campHeight / 2;
            
            // 使用图片绘制营地
            if (campImage && campImage.complete) {
                ctx.drawImage(
                    campImage,
                    campPosition.x - halfWidth,
                    campPosition.y - halfHeight,
                    config.campWidth,
                    config.campHeight
                );
            } else {
                // 图片未加载完成时，使用颜色绘制
                const campColor = levelConfig.campColors[gameState.currentLevel - 1];
                const borderColor = levelConfig.campBorderColors[gameState.currentLevel - 1];
                ctx.fillStyle = campColor;
                ctx.fillRect(campPosition.x - halfWidth, campPosition.y - halfHeight, config.campWidth, config.campHeight);
                ctx.strokeStyle = borderColor;
                ctx.lineWidth = 3;
                ctx.strokeRect(campPosition.x - halfWidth, campPosition.y - halfHeight, config.campWidth, config.campHeight);
            }
            
            // 绘制营地名
            ctx.fillStyle = 'white';
            ctx.font = '16px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('玩家营地', campPosition.x, campPosition.y - halfHeight - 10);
            
            ctx.restore();
        }

        // 绘制生命值和得分
        function drawHUD() {
            ctx.save();
            
            // 绘制生命值条
            ctx.fillStyle = '#4CAF50';
            ctx.fillRect(20, 20, 200, 20);
            
            // 绘制生命值
            const healthWidth = (gameState.health / 100) * 200;
            ctx.fillStyle = '#f44336';
            ctx.fillRect(20, 20, healthWidth, 20);
            
            // 绘制生命值文字
            ctx.fillStyle = 'black';
            ctx.font = '16px Arial';
            ctx.textAlign = 'left';
            ctx.fillText('生命值: ' + gameState.health, 230, 35);
            
            // 绘制得分
            ctx.fillText('得分: ' + gameState.score, 20, 70);
            
            // 绘制关卡
            ctx.fillText('关卡: ' + gameState.currentLevel, 20, 100);
            
            // 绘制关卡进度
            const currentLevelScore = levelConfig.levelScores[gameState.currentLevel - 1];
            const nextLevelScore = levelConfig.levelScores[gameState.currentLevel] || '∞';
            ctx.fillText('下一关: ' + nextLevelScore + '分', 20, 130);
            
            ctx.restore();
        }

        // 绘制背景
        function drawBackground() {
            // 获取当前关卡的背景图片
            const currentLevelIndex = gameState.currentLevel - 1;
            const bgImage = backgroundImages[currentLevelIndex];
            
            if (bgImage && bgImage.complete) {
                // 使用背景图片
                ctx.drawImage(bgImage, 0, 0, canvas.width, canvas.height);
            } else {
                // 图片未加载完成时，使用渐变背景作为备用
                const gradientColors = levelConfig.backgroundGradients[currentLevelIndex];
                const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
                gradient.addColorStop(0, gradientColors[0]);
                gradient.addColorStop(1, gradientColors[1]);
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                // 绘制简单的草地
                ctx.fillStyle = '#228B22';
                ctx.fillRect(0, canvas.height * 0.8, canvas.width, canvas.height * 0.2);
            }
        }

        // 检查碰撞（方形碰撞检测）
        function checkCollision(pos) {
            // 检查煤球是否在方形营地范围内
            const halfWidth = config.campWidth / 2;
            const halfHeight = config.campHeight / 2;
            
            return (
                pos.x >= campPosition.x - halfWidth &&
                pos.x <= campPosition.x + halfWidth &&
                pos.y >= campPosition.y - halfHeight &&
                pos.y <= campPosition.y + halfHeight
            );
        }

        // 检查煤球是否完全进入营地内部（用于扣血判断）
        function checkFullyInsideCamp(pos) {
            // 检查煤球是否完全在方形营地内部（考虑煤球半径）
            const halfWidth = config.campWidth / 2 - config.coalBallSize;
            const halfHeight = config.campHeight / 2 - config.coalBallSize;
            
            return (
                pos.x >= campPosition.x - halfWidth &&
                pos.x <= campPosition.x + halfWidth &&
                pos.y >= campPosition.y - halfHeight &&
                pos.y <= campPosition.y + halfHeight
            );
        }

        // 检查关卡提升
        function checkLevelUp() {
            const nextLevel = gameState.currentLevel + 1;
            if (nextLevel <= levelConfig.levelScores.length) {
                const nextLevelScore = levelConfig.levelScores[nextLevel - 1];
                if (gameState.score >= nextLevelScore) {
                    const oldLevel = gameState.currentLevel;
                    gameState.currentLevel = nextLevel;
                    
                    // 第4关开始恢复血条（只在进入第4关时恢复一次）
                    if (gameState.currentLevel === 4 && oldLevel < 4) {
                        gameState.health = Math.min(100, gameState.health + 30); // 恢复30点生命值，最多100
                    }
                    
                    // 显示关卡提升提示
                    document.getElementById('currentLevelDisplay').textContent = gameState.currentLevel;
                    const levelUpDiv = document.getElementById('levelUp');
                    levelUpDiv.style.display = 'block';
                    
                    // 2秒后隐藏提示
                    setTimeout(() => {
                        levelUpDiv.style.display = 'none';
                    }, 2000);
                }
            }
        }

        // 更新游戏状态
        function update() {
            if (gameState.gameOver || gameState.paused) return;
            
            // 检查关卡提升
            checkLevelUp();
            
            // 生成煤球
            const currentTime = Date.now();
            const maxCoalBalls = levelConfig.maxCoalBalls[gameState.currentLevel - 1];
            
            // 检查当前屏幕内的煤球数量（不包括正在弹飞的）
            const activeCoalBalls = gameState.coalBalls.filter(ball => !ball.isBouncing).length;
            
            if (currentTime - gameState.lastSpawnTime > gameState.spawnRate && activeCoalBalls < maxCoalBalls) {
                spawnCoalBall();
                gameState.lastSpawnTime = currentTime;
                
                // 随着等级提高，减少生成间隔
                if (gameState.currentLevel > 1) {
                    gameState.spawnRate = Math.max(500, 1000 - (gameState.currentLevel - 1) * 100);
                }
            }
            
            // 额外生成煤球（从第2关开始）
            const extraSpawnInterval = levelConfig.extraSpawnIntervals[gameState.currentLevel - 1];
            if (extraSpawnInterval && currentTime - gameState.lastExtraSpawnTime > extraSpawnInterval && activeCoalBalls < maxCoalBalls) {
                spawnCoalBall();
                gameState.lastExtraSpawnTime = currentTime;
            }
            
            // 更新煤球
            for (let i = gameState.coalBalls.length - 1; i >= 0; i--) {
                const coalBall = gameState.coalBalls[i];
                
                // 检查上一帧是否完全进入营地内部（用于扣血判断）
                const wasFullyInside = checkFullyInsideCamp({x: coalBall.lastX, y: coalBall.lastY});
                
                // 移动煤球
                coalBall.x += Math.cos(coalBall.angle) * coalBall.speed;
                coalBall.y += Math.sin(coalBall.angle) * coalBall.speed;
                
                // 检查当前帧是否在营地内（用于限制移动）
                const inCamp = checkCollision(coalBall);
                
                // 检查当前帧是否完全进入营地内部（用于扣血判断）
                const isFullyInside = checkFullyInsideCamp(coalBall);
                
                // 如果煤球从外部完全进入营地内部（上一帧不在内部，当前帧在内部），扣血（仅非弹击状态）
                if (!wasFullyInside && isFullyInside && !coalBall.isBouncing) {
                    gameState.health = Math.max(0, gameState.health - config.healthDecrease);
                }
                
                // 弹击状态下完全不受营地影响，直接跳过所有营地逻辑
                if (coalBall.isBouncing) {
                    // 更新上一帧位置
                    coalBall.lastX = coalBall.x;
                    coalBall.lastY = coalBall.y;
                    
                    // 检查是否飞出屏幕
                    if (
                        coalBall.x < -config.coalBallSize * 2 ||
                        coalBall.x > canvas.width + config.coalBallSize * 2 ||
                        coalBall.y < -config.coalBallSize * 2 ||
                        coalBall.y > canvas.height + config.coalBallSize * 2
                    ) {
                        gameState.coalBalls.splice(i, 1);
                    }
                    continue; // 跳过剩余逻辑
                }
                
                // 如果煤球在营地内且不是正在弹飞，限制其在营地范围内移动
                if (inCamp && coalBall.restricted) {
                    const halfWidth = config.campWidth / 2 - config.coalBallSize;
                    const halfHeight = config.campHeight / 2 - config.coalBallSize;
                    
                    // 如果超出方形营地范围，将其拉回边界内
                    if (coalBall.x < campPosition.x - halfWidth) {
                        coalBall.x = campPosition.x - halfWidth;
                        coalBall.angle = Math.random() * Math.PI * 2;
                    } else if (coalBall.x > campPosition.x + halfWidth) {
                        coalBall.x = campPosition.x + halfWidth;
                        coalBall.angle = Math.random() * Math.PI * 2;
                    }
                    
                    if (coalBall.y < campPosition.y - halfHeight) {
                        coalBall.y = campPosition.y - halfHeight;
                        coalBall.angle = Math.random() * Math.PI * 2;
                    } else if (coalBall.y > campPosition.y + halfHeight) {
                        coalBall.y = campPosition.y + halfHeight;
                        coalBall.angle = Math.random() * Math.PI * 2;
                    }
                }
                
                if (inCamp) {
                    // 煤球进入营地
                    if (!coalBall.inCamp) {
                        coalBall.inCamp = true;
                        coalBall.restricted = true; // 限制在营地内活动
                        coalBall.timeInCamp = 0;
                        coalBall.lastHealthDecrease = currentTime;
                        // 降低速度，在营地内缓慢移动
                        coalBall.speed = 1;
                    }
                    
                    // 增加停留时间
                    coalBall.timeInCamp += 16; // 假设60fps，每帧16ms
                    
                    // 获取当前关卡的停留时间限制
                    const currentMaxTime = levelConfig.coalBallMaxTimes[gameState.currentLevel - 1];
                    
                    // 煤球在营地停留达到关卡限制时间后，开始每1秒减少生命值
                    if (coalBall.timeInCamp >= currentMaxTime && 
                        currentTime - coalBall.lastHealthDecrease > config.healthDecreaseInterval) {
                        gameState.health -= config.healthDecrease;
                        coalBall.lastHealthDecrease = currentTime;
                    }
                } else {
                    coalBall.timeInCamp = 0;
                    coalBall.inCamp = false;
                    coalBall.restricted = false;
                }
                
                // 更新上一帧位置
                coalBall.lastX = coalBall.x;
                coalBall.lastY = coalBall.y;
                
                // 检查是否飞出屏幕
                if (
                    coalBall.x < -config.coalBallSize * 2 ||
                    coalBall.x > canvas.width + config.coalBallSize * 2 ||
                    coalBall.y < -config.coalBallSize * 2 ||
                    coalBall.y > canvas.height + config.coalBallSize * 2
                ) {
                    gameState.coalBalls.splice(i, 1);
                }
            }
            
            // 检查游戏结束
            if (gameState.health <= 0) {
                gameState.gameOver = true;
                document.getElementById('finalScore').textContent = gameState.score;
                document.getElementById('gameOver').style.display = 'block';
            }
        }

        // 弹开煤球
        function bounceCoalBall(x, y) {
            for (let i = gameState.coalBalls.length - 1; i >= 0; i--) {
                const coalBall = gameState.coalBalls[i];
                
                // 计算点击位置与煤球的距离
                const distance = Math.sqrt(
                    Math.pow(x - coalBall.x, 2) + Math.pow(y - coalBall.y, 2)
                );
                
                if (distance <= config.coalBallSize + 20) {
                    // 计算反弹方向（远离点击位置）
                    const angle = Math.atan2(coalBall.y - y, coalBall.x - x);
                    
                    // 设置新的目标位置（屏幕外）
                    const bounceDistance = 200;
                    coalBall.targetX = coalBall.x + Math.cos(angle) * bounceDistance;
                    coalBall.targetY = coalBall.y + Math.sin(angle) * bounceDistance;
                    coalBall.angle = angle;
                    coalBall.speed = 5; // 弹开速度
                    
                    // 设置正在弹飞标志
                    coalBall.isBouncing = true;
                    
                    // 增加得分
                    gameState.score += 10;
                    
                    // 播放弹开音效
                    playSound('bounce');
                    
                    break;
                }
            }
        }

        // 游戏主循环
        function gameLoop() {
            // 绘制背景
            drawBackground();
            
            // 绘制营地
            drawCamp();
            
            // 绘制煤球
            gameState.coalBalls.forEach(drawCoalBall);
            
            // 绘制HUD
            drawHUD();
            
            // 更新游戏状态
            update();
            
            requestAnimationFrame(gameLoop);
        }

        // 重新开始游戏
        function restartGame() {
            gameState.score = 0;
            gameState.health = 100;
            gameState.gameOver = false;
            gameState.paused = false;
            gameState.coalBalls = [];
            gameState.currentLevel = 1;
            gameState.spawnRate = 3000;
            gameState.lastSpawnTime = 0;
            gameState.lastExtraSpawnTime = 0;
            
            // 重置暂停按钮状态
            const pauseBtn = document.getElementById('pauseBtn');
            if (pauseBtn) {
                pauseBtn.textContent = '⏸️';
                pauseBtn.classList.remove('muted');
            }
            
            document.getElementById('gameOver').style.display = 'none';
        }

        // 触摸滑动状态
        let touchStartX = 0;
        let touchStartY = 0;
        let touchEndX = 0;
        let touchEndY = 0;
        let touchStartTime = 0;

        // 初始化
        function init() {
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);
            
            // 加载音效
            loadSoundEffects();
            
            // 触摸事件
            canvas.addEventListener('touchstart', (e) => {
                if (gameState.paused || gameState.gameOver) return;
                e.preventDefault();
                const touch = e.touches[0];
                touchStartX = touch.clientX;
                touchStartY = touch.clientY;
                touchStartTime = Date.now();
            });
            
            canvas.addEventListener('touchend', (e) => {
                if (gameState.paused || gameState.gameOver) return;
                e.preventDefault();
                if (e.changedTouches.length > 0) {
                    const touch = e.changedTouches[0];
                    touchEndX = touch.clientX;
                    touchEndY = touch.clientY;
                    const touchDuration = Date.now() - touchStartTime;
                    
                    // 计算滑动距离和速度
                    const deltaX = touchEndX - touchStartX;
                    const deltaY = touchEndY - touchStartY;
                    const distance = Math.sqrt(deltaX * deltaX + deltaY * deltaY);
                    const speed = distance / touchDuration;
                    
                    // 如果是快速滑动，弹飞煤球
                    if (distance > 20 && speed > 0.3) {
                        // 找到滑动路径上的煤球
                        gameState.coalBalls.forEach(coalBall => {
                            // 检查煤球是否在滑动路径附近
                            const rect = canvas.getBoundingClientRect();
                            const coalX = coalBall.x + rect.left;
                            const coalY = coalBall.y + rect.top;
                            
                            // 计算点到线段的距离
                            const distanceToLine = distanceToSegment(
                                coalX, coalY, 
                                touchStartX, touchStartY, 
                                touchEndX, touchEndY
                            );
                            
                            if (distanceToLine < config.coalBallSize + 35) {
                                // 计算反弹方向（按照手指滑动的方向）
                                // 这里使用从煤球到滑动终点的方向，这样更符合弹飞的感觉
                                const rect = canvas.getBoundingClientRect();
                                const coalScreenX = coalBall.x + rect.left;
                                const coalScreenY = coalBall.y + rect.top;
                                const angle = Math.atan2(touchEndY - coalScreenY, touchEndX - coalScreenX);
                                
                                // 设置新的目标位置（屏幕外）
                                const bounceDistance = 200;
                                coalBall.targetX = coalBall.x + Math.cos(angle) * bounceDistance;
                                coalBall.targetY = coalBall.y + Math.sin(angle) * bounceDistance;
                                coalBall.angle = angle;
                                coalBall.speed = 8; // 弹开速度
                                
                                // 设置正在弹飞标志
                                coalBall.isBouncing = true;
                                
                                // 增加得分
                                gameState.score += 10;
                                
                                // 播放弹开音效
                                playSound('bounce');
                            }
                        });
                    } else {
                        // 普通点击
                        const rect = canvas.getBoundingClientRect();
                        const x = touchEndX - rect.left;
                        const y = touchEndY - rect.top;
                        bounceCoalBall(x, y);
                    }
                }
            });
            
            // 鼠标事件（用于调试）
            canvas.addEventListener('click', (e) => {
                if (gameState.paused || gameState.gameOver) return;
                const rect = canvas.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                bounceCoalBall(x, y);
            });
            
            gameLoop();
        }
        
        // 计算点到线段的距离
        function distanceToSegment(px, py, x1, y1, x2, y2) {
            const A = px - x1;
            const B = py - y1;
            const C = x2 - x1;
            const D = y2 - y1;
            
            const dot = A * C + B * D;
            const lenSq = C * C + D * D;
            let param = -1;
            
            if (lenSq !== 0) {
                param = dot / lenSq;
            }
            
            let xx, yy;
            
            if (param < 0) {
                xx = x1;
                yy = y1;
            } else if (param > 1) {
                xx = x2;
                yy = y2;
            } else {
                xx = x1 + param * C;
                yy = y1 + param * D;
            }
            
            const dx = px - xx;
            const dy = py - yy;
            return Math.sqrt(dx * dx + dy * dy);
        }

        // 启动游戏
        init();
    </script>
</body>
