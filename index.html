<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>飞刀投掷游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        .instructions {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            font-family: Arial, sans-serif;
            font-size: 14px;
            text-align: center;
            z-index: 10;
        }
        #startBtn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 20px 40px;
            font-size: 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            z-index: 20;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        #startBtn:active {
            transform: translate(-50%, -50%) scale(0.95);
        }
    </style>
</head>
<body>
    <div class="instructions">
        手指左右滑动旋转飞刀，速度越快动力越大<br>
        手指快速向上滑动发射飞刀<br>
        击中靶子得分
    </div>
    <button id="startBtn">开始游戏</button>
    <canvas id="gameCanvas"></canvas>
    <script>
        // 游戏状态
        const gameState = {
            rotationSpeed: 0,
            rotationDirection: 0,
            knifeAngle: 0,
            knifeSpeed: 0,
            isFlying: false,
            targetPosition: { x: 0, y: 0 },
            score: 0,
            level: 1,
            isRotating: false,
            isTouching: false
        };

        // 游戏配置
        const config = {
            palmSize: 0.3,
            mistColor: 'rgba(173, 216, 230, 0.5)',
            mistShape: 'yin-yang',
            knifeLength: 200,
            knifeWidth: 10,
            targetSize: 50
        };

        // 图片资源
        const images = {
            knife: null,
            palm: null,
            mist: null,
            target: null,
            loaded: 0,
            total: 4
        };

        // 加载图片
        function loadImages() {
            const imageFiles = [
                { name: 'knife', src: 'knife.png' },
                { name: 'palm', src: 'palm.png' },
                { name: 'mist', src: 'mist.png' },
                { name: 'target', src: 'target.png' }
            ];

            imageFiles.forEach((imageInfo) => {
                const img = new Image();
                img.src = imageInfo.src;
                img.onload = () => {
                    images[imageInfo.name] = img;
                    images.loaded++;
                    console.log(`已加载: ${imageInfo.src}`);
                    if (images.loaded === images.total) {
                        console.log('所有图片加载完成');
                    }
                };
                img.onerror = () => {
                    console.error(`加载失败: ${imageInfo.src}`);
                    images.loaded++;
                };
            });
        }

        // 获取Canvas元素
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // 设置Canvas尺寸
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            gameState.targetPosition = {
                x: canvas.width / 2,
                y: canvas.height * 0.2
            };
        }

        // 初始化
        function init() {
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);
            loadImages();
            
            const startBtn = document.getElementById('startBtn');
            startBtn.addEventListener('click', () => {
                console.log('开始游戏');
                startBtn.style.display = 'none';
                setupTouchControls();
            });

            gameLoop();
        }
        
        // 触摸控制
        function setupTouchControls() {
            let touchStartX = 0;
            let touchStartY = 0;
            let touchStartTime = 0;
            let isTouching = false;
            let lastTouchX = 0;
            let touchHistory = [];
            
            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                const touch = e.touches[0];
                touchStartX = touch.clientX;
                touchStartY = touch.clientY;
                lastTouchX = touch.clientX;
                touchStartTime = Date.now();
                isTouching = true;
                gameState.isTouching = true;
                touchHistory = [];
                
                console.log('触摸开始:', touchStartX, touchStartY);
            }, { passive: false });
            
            canvas.addEventListener('touchmove', (e) => {
                e.preventDefault();
                if (!isTouching) return;
                
                const touch = e.touches[0];
                const currentX = touch.clientX;
                const currentY = touch.clientY;
                const deltaX = currentX - lastTouchX;
                
                touchHistory.push({
                    x: currentX,
                    y: currentY,
                    time: Date.now()
                });
                if (touchHistory.length > 10) {
                    touchHistory.shift();
                }
                
                const slideSpeed = Math.abs(deltaX);
                gameState.rotationSpeed = Math.min(slideSpeed * 3, 100);
                gameState.rotationDirection = deltaX > 0 ? 1 : -1;
                gameState.isRotating = gameState.rotationSpeed > 1;
                
                if (!gameState.isFlying) {
                    gameState.knifeAngle += deltaX * 0.02;
                }
                
                lastTouchX = currentX;
                
                console.log('触摸移动: deltaX=' + deltaX + ' 旋转速度=' + gameState.rotationSpeed);
            }, { passive: false });
            
            canvas.addEventListener('touchend', (e) => {
                e.preventDefault();
                if (!isTouching) return;
                
                isTouching = false;
                gameState.isTouching = false;
                const touchEndTime = Date.now();
                const touchDuration = touchEndTime - touchStartTime;
                
                if (touchHistory.length >= 2 && !gameState.isFlying) {
                    const startPoint = touchHistory[0];
                    const endPoint = touchHistory[touchHistory.length - 1];
                    const totalDeltaY = endPoint.y - startPoint.y;
                    const totalDeltaX = endPoint.x - startPoint.x;
                    const slideDuration = endPoint.time - startPoint.time;
                    
                    const upwardSpeed = Math.abs(totalDeltaY) / Math.max(slideDuration, 1);
                    
                    console.log('检测发射: 向上距离=' + totalDeltaY + ' 速度=' + upwardSpeed.toFixed(2) + ' 旋转速度=' + gameState.rotationSpeed.toFixed(2));
                    
                    if (totalDeltaY < -30 && 
                        gameState.rotationSpeed > 3 && 
                        upwardSpeed > 0.3 &&
                        Math.abs(totalDeltaX) < Math.abs(totalDeltaY) * 0.8) {
                        console.log('✓ 发射飞刀！');
                        launchKnife();
                    }
                }
                
                const slowDown = () => {
                    if (!isTouching && gameState.rotationSpeed > 0 && !gameState.isFlying) {
                        gameState.rotationSpeed *= 0.95;
                        if (gameState.rotationSpeed < 0.5) {
                            gameState.rotationSpeed = 0;
                            gameState.isRotating = false;
                        } else {
                            gameState.knifeAngle += gameState.rotationSpeed * 0.015 * gameState.rotationDirection;
                            requestAnimationFrame(slowDown);
                        }
                    }
                };
                slowDown();
                
                console.log('触摸结束: 持续时间=' + touchDuration + 'ms 最终旋转速度=' + gameState.rotationSpeed);
            }, { passive: false });
            
            console.log('触摸控制已启用');
        }

        // 发射飞刀
        function launchKnife() {
            gameState.isFlying = true;
            gameState.knifeSpeed = gameState.rotationSpeed * 0.3;
        }

        // 重置游戏状态
        function resetGameState() {
            gameState.isFlying = false;
            gameState.knifeSpeed = 0;
            gameState.rotationSpeed = 0;
            gameState.rotationDirection = 0;
            gameState.knifeAngle = 0;
            gameState.isRotating = false;
            gameState.isTouching = false;
        }

        // 绘制手掌
        function drawPalm() {
            const palmHeight = canvas.height * config.palmSize;
            const palmX = canvas.width / 2;
            const palmY = canvas.height - palmHeight / 2;

            if (images.palm) {
                const palmWidth = palmHeight * (images.palm.width / images.palm.height);
                ctx.drawImage(images.palm, palmX - palmWidth / 2, palmY - palmHeight / 2, palmWidth, palmHeight);
            } else {
                // 备用绘制
                const palmWidth = palmHeight * 0.8;
                ctx.beginPath();
                ctx.arc(palmX, palmY, palmWidth / 2, 0, Math.PI, true);
                ctx.lineTo(palmX - palmWidth / 2, palmY + palmHeight * 0.3);
                ctx.quadraticCurveTo(palmX, palmY + palmHeight * 0.6, palmX + palmWidth / 2, palmY + palmHeight * 0.3);
                ctx.closePath();
                ctx.fillStyle = '#f5d76e';
                ctx.fill();
                ctx.strokeStyle = '#d35400';
                ctx.lineWidth = 2;
                ctx.stroke();
            }
        }

        // 绘制雾气
        function drawMist() {
            const mistHeight = canvas.height * config.palmSize * 0.8;
            const mistX = canvas.width / 2;
            const mistY = canvas.height - canvas.height * config.palmSize - mistHeight / 2;

            if (images.mist) {
                const mistWidth = mistHeight * (images.mist.width / images.mist.height);
                ctx.globalAlpha = 0.8;
                ctx.drawImage(images.mist, mistX - mistWidth / 2, mistY - mistHeight / 2, mistWidth, mistHeight);
                ctx.globalAlpha = 1;
            } else {
                // 备用绘制
                ctx.save();
                ctx.globalAlpha = 0.5;
                const mistWidth = mistHeight * 1.2;
                
                if (config.mistShape === 'yin-yang') {
                    ctx.beginPath();
                    ctx.arc(mistX, mistY, mistWidth / 2, 0, Math.PI * 2);
                    ctx.fillStyle = config.mistColor;
                    ctx.fill();

                    ctx.beginPath();
                    ctx.arc(mistX - mistWidth * 0.2, mistY, mistWidth * 0.1, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(255,255,255, 0.8)';
                    ctx.fill();

                    ctx.beginPath();
                    ctx.arc(mistX + mistWidth * 0.2, mistY, mistWidth * 0.1, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
                    ctx.fill();
                } else {
                    ctx.beginPath();
                    ctx.arc(mistX, mistY, mistWidth / 2, 0, Math.PI * 2);
                    ctx.fillStyle = config.mistColor;
                    ctx.fill();
                }

                ctx.restore();
            }
        }

        // 绘制飞刀
        function drawKnife() {
            let knifeX, knifeY;
            
            if (gameState.isFlying) {
                const startY = canvas.height - canvas.height * config.palmSize - canvas.height * config.palmSize * 0.4;
                const flightDistance = gameState.knifeSpeed * 10;
                knifeX = canvas.width / 2;
                knifeY = startY - flightDistance;
            } else {
                const mistHeight = canvas.height * config.palmSize * 0.8;
                knifeX = canvas.width / 2;
                knifeY = canvas.height - canvas.height * config.palmSize - mistHeight / 2;
            }

            if (images.knife) {
                const knifeWidth = canvas.height * 0.15;
                const knifeHeight = knifeWidth * (images.knife.height / images.knife.width);
                
                ctx.save();
                ctx.translate(knifeX, knifeY);
                ctx.rotate(gameState.knifeAngle);
                ctx.drawImage(images.knife, -knifeWidth / 2, -knifeHeight / 2, knifeWidth, knifeHeight);
                ctx.restore();
            } else {
                // 备用绘制
                ctx.save();
                ctx.translate(knifeX, knifeY);
                ctx.rotate(gameState.knifeAngle);

                ctx.beginPath();
                ctx.rect(-config.knifeWidth * 1.2, -config.knifeWidth * 2, config.knifeWidth * 2.4, config.knifeWidth * 4);
                ctx.fillStyle = '#8b4513';
                ctx.fill();
                ctx.strokeStyle = '#5d2f0a';
                ctx.lineWidth = 2;
                ctx.stroke();

                ctx.beginPath();
                ctx.moveTo(-config.knifeWidth * 1.2, 0);
                ctx.lineTo(-config.knifeLength / 2, -config.knifeWidth / 2);
                ctx.lineTo(-config.knifeLength / 2, config.knifeWidth / 2);
                ctx.closePath();
                ctx.fillStyle = '#c0392b';
                ctx.fill();
                ctx.strokeStyle = '#8b0000';
                ctx.stroke();

                ctx.beginPath();
                ctx.moveTo(config.knifeWidth * 1.2, 0);
                ctx.lineTo(config.knifeLength / 2, -config.knifeWidth / 2);
                ctx.lineTo(config.knifeLength / 2, config.knifeWidth / 2);
                ctx.closePath();
                ctx.fillStyle = '#c0392b';
                ctx.fill();
                ctx.strokeStyle = '#8b0000';
                ctx.stroke();

                ctx.restore();
            }
        }

        // 绘制靶子
        function drawTarget() {
            const target = gameState.targetPosition;

            if (images.target) {
                const targetSize = canvas.height * 0.1;
                const targetWidth = targetSize;
                const targetHeight = targetSize * (images.target.height / images.target.width);
                ctx.drawImage(images.target, target.x - targetWidth / 2, target.y - targetHeight / 2, targetWidth, targetHeight);
            } else {
                // 备用绘制
                const size = config.targetSize;

                ctx.beginPath();
                ctx.arc(target.x, target.y, size, 0, Math.PI * 2);
                ctx.fillStyle = '#e74c3c';
                ctx.fill();
                ctx.strokeStyle = '#c0392b';
                ctx.lineWidth = 4;
                ctx.stroke();

                ctx.beginPath();
                ctx.arc(target.x, target.y, size * 0.7, 0, Math.PI * 2);
                ctx.fillStyle = '#f39c12';
                ctx.fill();
                ctx.strokeStyle = '#d35400';
                ctx.stroke();

                ctx.beginPath();
                ctx.arc(target.x, target.y, size * 0.4, 0, Math.PI * 2);
                ctx.fillStyle = '#27ae60';
                ctx.fill();
                ctx.strokeStyle = '#229954';
                ctx.stroke();

                ctx.beginPath();
                ctx.arc(target.x, target.y, size * 0.15, 0, Math.PI * 2);
                ctx.fillStyle = '#3498db';
                ctx.fill();
                ctx.strokeStyle = '#2980b9';
                ctx.stroke();
            }
        }

        // 绘制分数和等级
        function drawHUD() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.font = '20px Arial';
            ctx.textAlign = 'left';
            ctx.fillText('分数: ' + gameState.score, 20, 30);
            ctx.fillText('等级: ' + gameState.level, 20, 60);
        }

        // 更新游戏状态
        function update() {
            if (!gameState.isFlying) {
                if (gameState.rotationSpeed > 0.1 && !gameState.isTouching) {
                    gameState.knifeAngle += gameState.rotationSpeed * 0.01 * gameState.rotationDirection;
                }
            } else {
                gameState.knifeSpeed += 0.5;
                
                const startY = canvas.height - canvas.height * config.palmSize - canvas.height * config.palmSize * 0.4;
                const flightDistance = gameState.knifeSpeed * 10;
                const knifeX = canvas.width / 2;
                const knifeY = startY - flightDistance;

                const target = gameState.targetPosition;
                const distance = Math.sqrt(Math.pow(knifeX - target.x, 2) + Math.pow(knifeY - target.y, 2));
                
                if (distance < canvas.height * 0.05) {
                    gameState.score += 10;
                    resetGameState();
                    gameState.targetPosition = {
                        x: Math.random() * (canvas.width - canvas.height * 0.1) + canvas.height * 0.05,
                        y: Math.random() * (canvas.height * 0.3) + canvas.height * 0.05
                    };
                    if (gameState.score % 50 === 0) {
                        gameState.level++;
                    }
                } else if (knifeY < 0 || knifeX < 0 || knifeX > canvas.width) {
                    resetGameState();
                }
            }
        }

        // 游戏主循环
        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#667eea');
            gradient.addColorStop(1, '#764ba2');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            drawTarget();
            drawPalm();
            drawMist();
            drawKnife();
            drawHUD();
            update();



            requestAnimationFrame(gameLoop);
        }

        // 启动游戏
        init();
    </script>
</body>
</html>
