<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>飞刀投掷游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        .instructions {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            font-family: Arial, sans-serif;
            font-size: 14px;
            text-align: center;
            z-index: 10;
        }
        #startBtn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 20px 40px;
            font-size: 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            z-index: 20;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        #startBtn:active {
            transform: translate(-50%, -50%) scale(0.95);
        }
    </style>
</head>
<body>
    <div class="instructions">
        摇晃手机产生旋转，速度越快动力越大<br>
        向前送手机发射飞刀<br>
        击中靶子得分
    </div>
    <button id="startBtn">开始游戏</button>
    <canvas id="gameCanvas"></canvas>
    <script>
        // 游戏状态
        const gameState = {
            rotationSpeed: 0,
            rotationDirection: 0,
            knifeAngle: 0,
            knifeSpeed: 0,
            isFlying: false,
            targetPosition: { x: 0, y: 0 },
            score: 0,
            level: 1,
            initialDirection: 0, // 记录初始方向
            isRotating: false, // 是否正在旋转
            lastAcceleration: { x: 0, y: 0, z: 0 } // 上次加速度数据
        };

        // 游戏配置
        const config = {
            palmSize: 0.3, // 手掌占屏幕高度的比例
            mistColor: 'rgba(173, 216, 230, 0.5)', // 淡蓝色半透明
            mistShape: 'yin-yang', // 阴阳鱼形状
            knifeLength: 200, // 增加刀的长度一倍
            knifeWidth: 10,
            targetSize: 50,
            powerThreshold: 5, // 发射阈值
            forwardThreshold: -10 // 向前加速度阈值
        };

        // 获取Canvas元素
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // 设置Canvas尺寸
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            // 初始化靶子位置
            gameState.targetPosition = {
                x: canvas.width / 2,
                y: canvas.height * 0.2
            };
        }

        // 初始化
        function init() {
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);
            
            // 设置开始按钮点击事件
            const startBtn = document.getElementById('startBtn');
            startBtn.addEventListener('click', async () => {
                console.log('开始按钮被点击');
                
                // 检测设备支持情况
                const hasOrientation = typeof DeviceOrientationEvent !== 'undefined';
                const hasMotion = typeof DeviceMotionEvent !== 'undefined';
                const needsPermissionOrientation = hasOrientation && typeof DeviceOrientationEvent.requestPermission === 'function';
                const needsPermissionMotion = hasMotion && typeof DeviceMotionEvent.requestPermission === 'function';
                const isHTTPS = window.location.protocol === 'https:';
                const userAgent = navigator.userAgent;
                
                console.log('设备方向支持:', hasOrientation, '需要权限:', needsPermissionOrientation);
                console.log('设备运动支持:', hasMotion, '需要权限:', needsPermissionMotion);
                console.log('是否HTTPS:', isHTTPS);
                console.log('用户代理:', userAgent);
                
                try {
                    // 直接添加事件监听，不依赖权限请求
                    // 某些浏览器可能不需要显式权限
                    if (hasOrientation) {
                        window.addEventListener('deviceorientation', handleDeviceOrientation);
                        console.log('设备方向事件已添加');
                    }
                    
                    if (hasMotion) {
                        window.addEventListener('devicemotion', handleDeviceMotion);
                        console.log('设备运动事件已添加');
                    }
                    
                    // 尝试请求权限（如果需要）
                    if (needsPermissionOrientation) {
                        console.log('请求设备方向权限...');
                        const permissionState = await DeviceOrientationEvent.requestPermission();
                        console.log('设备方向权限状态:', permissionState);
                    }
                    
                    if (needsPermissionMotion) {
                        console.log('请求设备运动权限...');
                        const permissionState = await DeviceMotionEvent.requestPermission();
                        console.log('设备运动权限状态:', permissionState);
                    }

                    // 隐藏开始按钮
                    startBtn.style.display = 'none';
                    console.log('传感器设置完成');
                    
                    // 显示调试信息
                    alert('传感器设置完成！\n设备方向支持: ' + hasOrientation + '\n设备运动支持: ' + hasMotion + '\n是否HTTPS: ' + isHTTPS + '\n浏览器: ' + userAgent.substring(0, 50) + '...');
                } catch (err) {
                    console.log('请求传感器权限失败:', err);
                    alert('权限请求失败: ' + err.message + '\n是否HTTPS: ' + isHTTPS + '\n将启用触摸控制模式');
                    
                    // 即使失败也尝试添加事件监听（某些浏览器不需要权限）
                    if (hasOrientation) {
                        window.addEventListener('deviceorientation', handleDeviceOrientation);
                        console.log('设备方向事件已添加（备用方案）');
                    }
                    if (hasMotion) {
                        window.addEventListener('devicemotion', handleDeviceMotion);
                        console.log('设备运动事件已添加（备用方案）');
                    }
                    startBtn.style.display = 'none';
                }
                
                // 启用触摸控制作为备用方案
                setupTouchControls();
            });

            gameLoop();
        }
        
        // 触摸控制备用方案
        function setupTouchControls() {
            let touchStartX = 0;
            let touchStartY = 0;
            let touchStartTime = 0;
            
            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                const touch = e.touches[0];
                touchStartX = touch.clientX;
                touchStartY = touch.clientY;
                touchStartTime = Date.now();
            }, { passive: false });
            
            canvas.addEventListener('touchmove', (e) => {
                e.preventDefault();
                const touch = e.touches[0];
                const deltaX = touch.clientX - touchStartX;
                const deltaY = touch.clientY - touchStartY;
                
                // 根据触摸移动模拟旋转
                gameState.rotationSpeed = Math.abs(deltaX) * 0.5;
                gameState.rotationDirection = deltaX > 0 ? 1 : -1;
            }, { passive: false });
            
            canvas.addEventListener('touchend', (e) => {
                e.preventDefault();
                const touchDuration = Date.now() - touchStartTime;
                
                // 快速滑动模拟发射
                if (touchDuration < 200 && gameState.rotationSpeed > config.powerThreshold && !gameState.isFlying) {
                    launchKnife();
                }
                
                // 重置旋转速度
                gameState.rotationSpeed = 0;
            }, { passive: false });
            
            console.log('触摸控制已启用');
        }

        // 处理设备方向事件
        function handleDeviceOrientation(event) {
            // alpha: 围绕z轴的旋转角度 (0-360)
            // beta: 围绕x轴的旋转角度 (-180到180)
            // gamma: 围绕y轴的旋转角度 (-90到90)
            if (event.alpha !== null) {
                // 计算旋转方向
                gameState.rotationDirection = event.alpha > 180 ? -1 : 1;
            }
        }

        // 处理设备运动事件
        function handleDeviceMotion(event) {
            // acceleration: 加速度数据
            // rotationRate: 旋转速率
            if (event.rotationRate) {
                const z = event.rotationRate.alpha || 0;
                const x = event.rotationRate.gamma || 0;
                const y = event.rotationRate.beta || 0;
                
                // 综合计算旋转速度，增加敏感度
                const rotationMagnitude = Math.sqrt(x*x + y*y + z*z);
                // 平滑处理旋转速度，避免突变
                gameState.rotationSpeed = gameState.rotationSpeed * 0.7 + rotationMagnitude * 0.3;
                
                // 降低旋转检测阈值，增加敏感度
                gameState.isRotating = gameState.rotationSpeed > 0.5;
                
                console.log('旋转速度:', gameState.rotationSpeed, '是否旋转:', gameState.isRotating);
            }

            // 检测向前的加速度
            if (event.accelerationIncludingGravity) {
                const acc = event.accelerationIncludingGravity;
                const currentAcc = { x: acc.x || 0, y: acc.y || 0, z: acc.z || 0 };
                
                // 计算加速度变化
                const deltaX = Math.abs(currentAcc.x - gameState.lastAcceleration.x);
                const deltaY = Math.abs(currentAcc.y - gameState.lastAcceleration.y);
                const deltaZ = Math.abs(currentAcc.z - gameState.lastAcceleration.z);
                
                // 更新上次加速度数据
                gameState.lastAcceleration = currentAcc;
                
                console.log('加速度:', currentAcc, '变化:', { deltaX, deltaY, deltaZ });
                
                // 检测向前的加速度（y轴负方向）
                // 降低阈值，增加敏感度
                if (currentAcc.y < -5 && // 降低向前加速度阈值
                    deltaY > 3 && // 降低加速度变化阈值
                    gameState.isRotating && // 确保正在旋转
                    gameState.rotationSpeed > 2 && // 降低旋转速度阈值
                    !gameState.isFlying) { // 确保不在飞行中
                    console.log('发射飞刀！');
                    launchKnife();
                }
            }
        }

        // 发射飞刀
        function launchKnife() {
            gameState.isFlying = true;
            gameState.knifeSpeed = gameState.rotationSpeed * 0.5;
            // 使用当前的旋转角度作为发射角度
            // 确保飞刀向正前方飞行
            gameState.knifeAngle = Math.PI / 2; // 向上飞行
        }

        // 绘制手掌
        function drawPalm() {
            const palmHeight = canvas.height * config.palmSize;
            const palmWidth = palmHeight * 0.8;
            const palmX = canvas.width / 2;
            const palmY = canvas.height - palmHeight / 2;

            // 绘制手掌轮廓
            ctx.beginPath();
            ctx.arc(palmX, palmY, palmWidth / 2, 0, Math.PI, true);
            ctx.lineTo(palmX - palmWidth / 2, palmY + palmHeight * 0.3);
            ctx.quadraticCurveTo(palmX, palmY + palmHeight * 0.6, palmX + palmWidth / 2, palmY + palmHeight * 0.3);
            ctx.closePath();
            ctx.fillStyle = '#f5d76e';
            ctx.fill();
            ctx.strokeStyle = '#d35400';
            ctx.lineWidth = 2;
            ctx.stroke();

            // 绘制手指
            const fingerWidth = palmWidth * 0.15;
            const fingerHeight = palmHeight * 0.4;
            
            // 拇指
            ctx.beginPath();
            ctx.ellipse(palmX - palmWidth * 0.3, palmY - palmHeight * 0.1, fingerWidth, fingerHeight, Math.PI / 4, 0, Math.PI * 2);
            ctx.fillStyle = '#f5d76e';
            ctx.fill();
            ctx.strokeStyle = '#d35400';
            ctx.stroke();

            // 其他手指
            for (let i = 0; i < 4; i++) {
                const fingerX = palmX - palmWidth * 0.25 + i * palmWidth * 0.2;
                ctx.beginPath();
                ctx.ellipse(fingerX, palmY - palmHeight * 0.2, fingerWidth, fingerHeight, 0, 0, Math.PI * 2);
                ctx.fillStyle = '#f5d76e';
                ctx.fill();
                ctx.strokeStyle = '#d35400';
                ctx.stroke();
            }
        }

        // 绘制雾气
        function drawMist() {
            const mistHeight = canvas.height * config.palmSize * 0.8;
            const mistWidth = mistHeight * 1.2;
            const mistX = canvas.width / 2;
            const mistY = canvas.height - canvas.height * config.palmSize - mistHeight / 2;

            ctx.save();
            ctx.globalAlpha = 0.5;
            
            if (config.mistShape === 'yin-yang') {
                // 绘制阴阳鱼形状的雾气
                ctx.beginPath();
                ctx.arc(mistX, mistY, mistWidth / 2, 0, Math.PI * 2);
                ctx.fillStyle = config.mistColor;
                ctx.fill();

                // 绘制阴阳鱼的眼睛
                ctx.beginPath();
                ctx.arc(mistX - mistWidth * 0.2, mistY, mistWidth * 0.1, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
                ctx.fill();

                ctx.beginPath();
                ctx.arc(mistX + mistWidth * 0.2, mistY, mistWidth * 0.1, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
                ctx.fill();
            } else {
                // 绘制圆形雾气
                ctx.beginPath();
                ctx.arc(mistX, mistY, mistWidth / 2, 0, Math.PI * 2);
                ctx.fillStyle = config.mistColor;
                ctx.fill();
            }

            ctx.restore();
        }

        // 绘制飞刀
        function drawKnife() {
            const mistHeight = canvas.height * config.palmSize * 0.8;
            const knifeX = canvas.width / 2;
            const knifeY = canvas.height - canvas.height * config.palmSize - mistHeight / 2;

            ctx.save();
            ctx.translate(knifeX, knifeY);
            ctx.rotate(gameState.knifeAngle);

            // 绘制刀柄（中心位置）
            ctx.beginPath();
            ctx.rect(-config.knifeWidth * 1.2, -config.knifeWidth * 2, config.knifeWidth * 2.4, config.knifeWidth * 4);
            ctx.fillStyle = '#8b4513';
            ctx.fill();
            ctx.strokeStyle = '#5d2f0a';
            ctx.lineWidth = 2;
            ctx.stroke();

            // 绘制左边刀尖
            ctx.beginPath();
            ctx.moveTo(-config.knifeWidth * 1.2, 0);
            ctx.lineTo(-config.knifeLength / 2, -config.knifeWidth / 2);
            ctx.lineTo(-config.knifeLength / 2, config.knifeWidth / 2);
            ctx.closePath();
            ctx.fillStyle = '#c0392b';
            ctx.fill();
            ctx.strokeStyle = '#8b0000';
            ctx.stroke();

            // 绘制右边刀尖
            ctx.beginPath();
            ctx.moveTo(config.knifeWidth * 1.2, 0);
            ctx.lineTo(config.knifeLength / 2, -config.knifeWidth / 2);
            ctx.lineTo(config.knifeLength / 2, config.knifeWidth / 2);
            ctx.closePath();
            ctx.fillStyle = '#c0392b';
            ctx.fill();
            ctx.strokeStyle = '#8b0000';
            ctx.stroke();

            ctx.restore();
        }

        // 绘制靶子
        function drawTarget() {
            const target = gameState.targetPosition;
            const size = config.targetSize;

            // 绘制靶子外圈
            ctx.beginPath();
            ctx.arc(target.x, target.y, size, 0, Math.PI * 2);
            ctx.fillStyle = '#e74c3c';
            ctx.fill();
            ctx.strokeStyle = '#c0392b';
            ctx.lineWidth = 4;
            ctx.stroke();

            // 绘制靶子中圈
            ctx.beginPath();
            ctx.arc(target.x, target.y, size * 0.7, 0, Math.PI * 2);
            ctx.fillStyle = '#f39c12';
            ctx.fill();
            ctx.strokeStyle = '#d35400';
            ctx.stroke();

            // 绘制靶子内圈
            ctx.beginPath();
            ctx.arc(target.x, target.y, size * 0.4, 0, Math.PI * 2);
            ctx.fillStyle = '#27ae60';
            ctx.fill();
            ctx.strokeStyle = '#229954';
            ctx.stroke();

            // 绘制靶子中心
            ctx.beginPath();
            ctx.arc(target.x, target.y, size * 0.15, 0, Math.PI * 2);
            ctx.fillStyle = '#3498db';
            ctx.fill();
            ctx.strokeStyle = '#2980b9';
            ctx.stroke();
        }

        // 绘制分数和等级
        function drawHUD() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.font = '20px Arial';
            ctx.textAlign = 'left';
            ctx.fillText(`分数: ${gameState.score}`, 20, 30);
            ctx.fillText(`等级: ${gameState.level}`, 20, 60);
            ctx.fillText(`动力: ${Math.round(gameState.rotationSpeed * 10) / 10}`, 20, 90);
        }

        // 更新游戏状态
        function update() {
            // 更新飞刀角度
            if (!gameState.isFlying) {
                // 根据旋转速度和方向更新飞刀角度
                gameState.knifeAngle += gameState.rotationSpeed * 0.005 * gameState.rotationDirection;
            } else {
                // 飞刀飞行
                const speed = gameState.knifeSpeed;
                gameState.knifeAngle += 0.1;
                
                // 计算飞刀位置
                const knifeX = canvas.width / 2 + Math.sin(gameState.knifeAngle) * speed * 5;
                const knifeY = canvas.height - canvas.height * config.palmSize - canvas.height * config.palmSize * 0.4 + Math.cos(gameState.knifeAngle) * speed * 5;

                // 检测是否击中靶子
                const target = gameState.targetPosition;
                const distance = Math.sqrt(Math.pow(knifeX - target.x, 2) + Math.pow(knifeY - target.y, 2));
                
                if (distance < config.targetSize) {
                    // 击中靶子
                    gameState.score += 10;
                    gameState.isFlying = false;
                    // 重新设置靶子位置
                    gameState.targetPosition = {
                        x: Math.random() * (canvas.width - config.targetSize * 2) + config.targetSize,
                        y: Math.random() * (canvas.height * 0.3) + config.targetSize
                    };
                    // 升级
                    if (gameState.score % 50 === 0) {
                        gameState.level++;
                        // 调整游戏难度
                        config.powerThreshold += 0.5;
                    }
                } else if (knifeY < 0 || knifeX < 0 || knifeX > canvas.width) {
                    // 飞刀飞出屏幕
                    gameState.isFlying = false;
                }
            }
        }

        // 游戏主循环
        function gameLoop() {
            // 清空画布
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 绘制背景
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#667eea');
            gradient.addColorStop(1, '#764ba2');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 绘制靶子
            drawTarget();

            // 绘制手掌
            drawPalm();

            // 绘制雾气
            drawMist();

            // 绘制飞刀
            drawKnife();

            // 绘制HUD
            drawHUD();

            // 更新游戏状态
            update();

            // 请求下一帧
            requestAnimationFrame(gameLoop);
        }

        // 启动游戏
        init();
    </script>
</body>
</html>
